name: platform-monitoring

services:
  grafana:
    image: grafana/grafana:13.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${MONITORING_BIND_IP:-192.168.50.127}:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in the Beelink-local .env file}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "http://${MONITORING_BIND_IP:-192.168.50.127}:3000/"
      GF_INSTALL_PLUGINS: ""
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_PLUGINS_PREINSTALL_AUTO_UPDATE: "false"
    volumes:
      - /platform/data/monitoring/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
    user: "472:472"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.listen-address=0.0.0.0:9090"
    ports:
      - "${MONITORING_BIND_IP:-192.168.50.127}:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /platform/data/monitoring/prometheus:/prometheus
    networks:
      - monitoring
    depends_on:
      - node-exporter
      - cadvisor
      - otel-docker-stats
    user: "65534:65534"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  docker-api-proxy:
    image: tecnativa/docker-socket-proxy:0.4.2
    container_name: docker-api-proxy
    restart: unless-stopped
    expose:
      - "2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    environment:
      LOG_LEVEL: "info"
      AUTH: "0"
      BUILD: "0"
      COMMIT: "0"
      CONFIGS: "0"
      CONTAINERS: "1"
      DISTRIBUTION: "0"
      EVENTS: "0"
      EXEC: "0"
      GRPC: "0"
      IMAGES: "0"
      INFO: "1"
      NETWORKS: "0"
      NODES: "0"
      PING: "1"
      PLUGINS: "0"
      POST: "0"
      SECRETS: "0"
      SERVICES: "0"
      SESSION: "0"
      SWARM: "0"
      SYSTEM: "0"
      TASKS: "0"
      VERSION: "1"
      VOLUMES: "0"
      ALLOW_START: "0"
      ALLOW_STOP: "0"
      ALLOW_RESTARTS: "0"
      ALLOW_PAUSE: "0"
      ALLOW_UNPAUSE: "0"
    read_only: true
    tmpfs:
      - /run
      - /tmp
      - /var/lib/haproxy
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: "0.25"

  otel-docker-stats:
    image: otel/opentelemetry-collector-contrib:0.156.0
    container_name: otel-docker-stats
    restart: unless-stopped
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    expose:
      - "9464"
      - "13133"
    volumes:
      - ./otel/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - monitoring
    depends_on:
      - docker-api-proxy
    read_only: true
    tmpfs:
      - /tmp
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: "0.50"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/credentials/.+|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)"
      - "--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$"
    expose:
      - "9100"
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - monitoring
    read_only: true
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  monitoring:
    name: platform-monitoring
    driver: bridge
