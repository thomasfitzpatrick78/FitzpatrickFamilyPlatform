id: svc-pihole-dns
record_type: service
name: Pi-hole DNS Service
description: Active family DNS and blocking service hosted in Docker on the Beelink.
owner: owner-family-platform
location: loc-home
lifecycle_status: active
health_status: healthy
monitoring_ready: true
service_interface: DNS and Pi-hole admin
runtime_status: running
production_host: beelink
ip_address: 192.168.50.127
dns_ports: TCP/UDP 53
admin_port: TCP 8080
container_name: pihole
compose_path: /platform/compose/pihole
persistent_configuration: /platform/data/pihole/etc-pihole
availability_role: production
validation_status: container healthy, DNS resolution verified, blocklist enforcement verified, router DNS cutover completed
rollback_service: svc-pihole-raspberry-pi-rollback
customer_users: household devices and family members
unknowns: production image version, image digest, backup status, and restore validation status TBD
dependencies:
  - host-beelink-mini-pc
  - svc-docker-engine
  - net-asus-mesh-router-primary
host_dependencies:
  - host-beelink-mini-pc
service_dependencies:
  - svc-docker-engine
network_dependencies:
  - net-asus-mesh-router-primary
power_dependencies:
  - dev-ups-battery-backup
administrative_dependencies:
  - dev-toms-macbook-admin
